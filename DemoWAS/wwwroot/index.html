    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <!-- Toast -->

    <!-- App Styles -->
    <link rel="stylesheet" href="/css/app.css" />

<body style="background-color: #121212;">

    <!-- Notification Sound -->
    <audio id="notif" src="/Sounds/Alart.mp3" preload="auto"></audio>

    <!-- Blazor App -->
    <div id="app" style="background-color: #121212;">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <!-- Error UI -->
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <!-- Custom Scripts -->
    <script src="/JS/Script.js"></script>
    <script src="/fcm.js"></script>

    <!-- Firebase Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('firebase-messaging-sw.js')
                .then(reg => {
                    console.log('Service Worker registered:', reg.scope);
                })
                .catch(err => {
                    console.error('Service Worker registration failed:', err);
                });
        }
    </script>

    <!-- Blazor -->
    <script src="/_framework/blazor.webassembly.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script type="application/ld+json">
        {
          "@type": "Restaurant",
          "name": "الفكهاني",

          "address": {
            "@type": "PostalAddress",
            "streetAddress": "الكاظمية تقاطع شارع اكد",
            "addressLocality": "بغداد",
            "addressCountry": "IQ"
          }
        }
